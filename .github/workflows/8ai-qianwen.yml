name: Build IJKPlayer with OpenSSL (armv7 + arm64)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git make yasm gcc g++ pkg-config autoconf automake libtool cmake
          sudo apt-get install -y linux-headers-generic

      - name: Setup NDK r14b
        run: |
          cd $HOME
          wget -q https://dl.google.com/android/repository/android-ndk-r14b-linux-x86_64.zip
          unzip -q android-ndk-r14b-linux-x86_64.zip
          echo "ANDROID_NDK=$HOME/android-ndk-r14b" >> $GITHUB_ENV
          echo "$HOME/android-ndk-r14b" >> $GITHUB_PATH

      - name: Override system NDK
        run: |
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK" >> $GITHUB_ENV
          echo "NDK_ROOT=$ANDROID_NDK" >> $GITHUB_ENV
          sudo rm -rf /usr/local/lib/android/sdk/ndk/27.3.13750724 || true

      - name: Clone IJKPlayer
        run: |
          git clone https://github.com/Bilibili/ijkplayer.git ijkplayer
          cd ijkplayer
          git checkout k0.8.8

      - name: Initialize OpenSSL and FFmpeg
        run: |
          cd ijkplayer
          ./init-android-openssl.sh
          ./init-android.sh

      - name: Enable OpenSSL and disable problematic features
        run: |
          cd ijkplayer/config
          rm -f module.sh
          ln -s module-default.sh module.sh
          echo 'export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --enable-openssl --disable-linux-perf --disable-programs --disable-doc --disable-debug"' >> module.sh

      # 修复 perf_event.h 依赖问题
      - name: Patch FFmpeg to remove perf_event.h dependency
        run: |
          cd ijkplayer
          # 完全移除perf_event.h的包含并添加条件编译
          sed -i '/#include <linux\/perf_event.h>/d' extra/ffmpeg/libavutil/timer.h
          sed -i '1i#ifndef __ANDROID__\n#include <linux/perf_event.h>\n#endif' extra/ffmpeg/libavutil/timer.h
          
          # 为Android平台添加预处理器定义
          echo 'export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS -DHAVE_PERF_H=0"' >> config/module.sh

      - name: Compile OpenSSL
        run: |
          cd ijkplayer/android/contrib
          ./compile-openssl.sh clean
          ./compile-openssl.sh all

      - name: Compile FFmpeg
        run: |
          cd ijkplayer/android/contrib
          ./compile-ffmpeg.sh clean
          ./compile-ffmpeg.sh all

      - name: Compile IJKPlayer
        run: |
          cd ijkplayer/android
          ./compile-ijk.sh all

      - name: Collect .so files
        run: |
          mkdir -p output/armeabi-v7a output/arm64-v8a
          find ijkplayer -name "libijkplayer.so" -type f
          cp ijkplayer/ijkplayer-armv7a/src/main/libs/armeabi-v7a/libijkplayer.so output/armeabi-v7a/ 2>/dev/null || \
          cp ijkplayer/ijkplayer-armv7a/library/src/main/libs/armeabi-v7a/libijkplayer.so output/armeabi-v7a/
          cp ijkplayer/ijkplayer-arm64/src/main/libs/arm64-v8a/libijkplayer.so output/arm64-v8a/ 2>/dev/null || \
          cp ijkplayer/ijkplayer-arm64/library/src/main/libs/arm64-v8a/libijkplayer.so output/arm64-v8a/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ijkplayer-openssl-libs
          path: output/
