name: Build IJKPlayer with OpenSSL (armv7 + arm64)
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git make yasm gcc g++ pkg-config autoconf automake libtool cmake
          sudo apt-get install -y linux-headers-generic  # 通用内核头文件（备用）

      - name: Setup NDK r14b
        run: |
          cd $HOME
          wget -q https://dl.google.com/android/repository/android-ndk-r14b-linux-x86_64.zip
          unzip -q android-ndk-r14b-linux-x86_64.zip
          echo "ANDROID_NDK=$HOME/android-ndk-r14b" >> $GITHUB_ENV
          echo "$HOME/android-ndk-r14b" >> $GITHUB_PATH

      - name: Override system NDK
        run: |
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK" >> $GITHUB_ENV
          echo "NDK_ROOT=$ANDROID_NDK" >> $GITHUB_ENV
          sudo rm -rf /usr/local/lib/android/sdk/ndk/27.3.13750724 || true

      - name: Clone IJKPlayer
        run: |
          git clone https://github.com/Bilibili/ijkplayer.git ijkplayer
          cd ijkplayer
          git checkout k0.8.8

      - name: Initialize OpenSSL and FFmpeg
        run: |
          cd ijkplayer
          ./init-android-openssl.sh
          ./init-android.sh

      - name: Enable OpenSSL and disable linux-perf
        run: |
          cd ijkplayer/config
          rm -f module.sh
          ln -s module-default.sh module.sh
          echo 'export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --enable-openssl --disable-linux-perf"' >> module.sh
          cat module.sh

      # 关键：递归删除所有 perf_event.h 引用（彻底解决编译依赖）
      - name: Patch FFmpeg to remove perf_event.h
        run: |
          cd ijkplayer/extra/ffmpeg
          find . -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's|#include <linux/perf_event.h>|/* & */|g' {} \;
          sed -i 's|#include <linux/perf_event.h>|/* & */|g' libavutil/timer.h || true

      - name: Compile OpenSSL
        run: |
          cd ijkplayer/android/contrib
          ./compile-openssl.sh clean
          ./compile-openssl.sh all

      - name: Compile FFmpeg
        run: |
          cd ijkplayer/android/contrib
          ./compile-ffmpeg.sh clean
          ./compile-ffmpeg.sh all

      - name: Compile IJKPlayer
        run: |
          cd ijkplayer/android
          ./compile-ijk.sh all

      # 关键修复：验证输出路径并收集 .so 文件
      - name: Collect .so files (Debug)
        run: |
          echo "--- 检查 IJKPlayer 编译输出目录 ---"
          ls -la ijkplayer/ijkplayer-armv7a/src/main/libs/  # 查看实际输出路径
          ls -la ijkplayer/ijkplayer-arm64/src/main/libs/
          
          mkdir -p output/armeabi-v7a output/arm64-v8a
          cp ijkplayer/ijkplayer-armv7a/src/main/libs/armeabi-v7a/libijkplayer.so output/armeabi-v7a/ || echo "armv7a 文件复制失败"
          cp ijkplayer/ijkplayer-arm64/src/main/libs/arm64-v8a/libijkplayer.so output/arm64-v8a/ || echo "arm64 文件复制失败"
          
          echo "--- 检查 output 目录内容 ---"
          ls -la output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ijkplayer-openssl-libs
          path: output/
