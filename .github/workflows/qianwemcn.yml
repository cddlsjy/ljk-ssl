name: Build IJKPlayer with OpenSSL (HTTPS)

on:
  workflow_dispatch:
    inputs:
      build_config:
        description: '选择编译配置'
        required: true
        default: 'module-default.sh'
        type: choice
        options:
          - module-lite.sh
          - module-default.sh
          - module-lite-hevc.sh

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    env:
      ANDROID_NDK: /opt/android-ndk-r10e
      ANDROID_NDK_HOME: /opt/android-ndk-r10e
      ANDROID_SDK_ROOT: /opt/android-sdk

    steps:
      - name: 🛠️ 准备环境 (Fix Ubuntu 22.04 Compatibility)
        run: |
          # 1. 安装基础依赖 (Ubuntu 22.04 默认没有 python2)
          sudo apt-get update
          sudo apt-get install -y wget git yasm pkg-config autoconf automake libtool \
                                  build-essential openjdk-8-jdk unzip libncurses5 \
                                  python2.7 python2.7-dev --no-install-recommends
          
          # 2. 关键修复：创建 python 软链接 (NDK r10e 需要 python)
          sudo ln -sf /usr/bin/python2.7 /usr/bin/python
          python --version

      - name: 📦 下载 Android SDK
        run: |
          mkdir -p $ANDROID_SDK_ROOT
          cd $ANDROID_SDK_ROOT
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-7583922_latest.zip
          unzip -q commandlinetools-linux-7583922_latest.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          yes | cmdline-tools/latest/bin/sdkmanager --licenses || true
          cmdline-tools/latest/bin/sdkmanager "platforms;android-21" "build-tools;25.0.3"

      - name: 📦 下载 Android NDK r10e (修复下载源)
        run: |
          mkdir -p /opt
          cd /opt
          # 使用 Google 官方源，如果失败会自动尝试清华源 (虽然清华源 r10e 可能失效，但保留备用逻辑)
          wget -q -O android-ndk.zip https://dl.google.com/android/repository/android-ndk-r10e-linux-x86_64.zip || \
          wget -q -O android-ndk.zip https://github.com/philplckthun/android-ndk-archives/releases/download/android-ndk-r10e/android-ndk-r10e-linux-x86_64.zip
          
          unzip -q android-ndk.zip
          mv android-ndk-r10e /opt/android-ndk-r10e
          rm android-ndk.zip

      - name: 📦 获取 IJKPlayer 源码
        run: |
          git clone https://github.com/Bilibili/ijkplayer.git ijkplayer-android
          cd ijkplayer-android
          git checkout k0.8.8 # 稳定版本

      - name: ⚙️ 配置 OpenSSL 支持 (HTTPS 核心步骤)
        run: |
          cd ijkplayer-android/config
          # 选择用户指定的配置文件
          cp ${GITHUB_EVENT_PATH_INPUTS_BUILD_CONFIG} module.sh
          
          # 修复旧版配置错误 (NDK r10e 兼容性)
          sed -i 's/--disable-vda//g' module.sh
          sed -i 's/--disable-ffserver//g' module.sh
          
          # 关键：添加 OpenSSL 支持 (支持 HTTPS/SSL)
          echo 'export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --enable-openssl"' >> module.sh
          
          # 修复 Linux Perf 头文件缺失问题 (Ubuntu 22.04 特有)
          echo 'export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --disable-linux-perf"' >> module.sh

      - name: 🔧 初始化依赖
        run: |
          cd ijkplayer-android
          ./init-android.sh
          ./init-android-openssl.sh

      - name: 🏗️ 编译 OpenSSL
        run: |
          cd ijkplayer-android/android/contrib
          ./compile-openssl.sh clean
          ./compile-openssl.sh all

      - name: 🏗️ 编译 FFmpeg (含 OpenSSL)
        run: |
          cd ijkplayer-android/android/contrib
          ./compile-ffmpeg.sh clean
          ./compile-ffmpeg.sh all

      - name: 🏗️ 编译 IJKPlayer
        run: |
          cd ijkplayer-android/android
          ./compile-ijk.sh all

      - name: 📤 打包输出
        run: |
          mkdir -p ./libs
          # 复制所有架构的 .so 文件
          cp -r ijkplayer-android/android/ijkplayer/ijkplayer-*/src/main/libs/* ./libs/ 2>/dev/null || echo "No libs found, check logs"
          ls -lh ./libs/

      - name: 📎 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ijkplayer-so-libs
          path: ./libs/
          retention-days: 7
