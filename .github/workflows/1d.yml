name: Build IJKPlayer with OpenSSL (armv7 + arm64)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git make yasm gcc g++ pkg-config autoconf automake libtool cmake
          # 安装通用内核头文件（解决 perf_event.h 缺失）
          sudo apt-get install -y linux-headers-generic

      - name: Setup NDK r14b
        run: |
          cd $HOME
          wget -q https://dl.google.com/android/repository/android-ndk-r14b-linux-x86_64.zip
          unzip -q android-ndk-r14b-linux-x86_64.zip
          echo "ANDROID_NDK=$HOME/android-ndk-r14b" >> $GITHUB_ENV
          echo "$HOME/android-ndk-r14b" >> $GITHUB_PATH

      - name: Override system NDK
        run: |
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK" >> $GITHUB_ENV
          echo "NDK_ROOT=$ANDROID_NDK" >> $GITHUB_ENV
          sudo rm -rf /usr/local/lib/android/sdk/ndk/27.3.13750724 || true

      - name: Clone IJKPlayer
        run: |
          git clone https://github.com/Bilibili/ijkplayer.git ijkplayer
          cd ijkplayer
          git checkout k0.8.8

      - name: Initialize OpenSSL and FFmpeg
        run: |
          cd ijkplayer
          ./init-android-openssl.sh
          ./init-android.sh

      - name: Enable OpenSSL and disable linux-perf
        run: |
          cd ijkplayer/config
          rm -f module.sh
          ln -s module-default.sh module.sh
          echo 'export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --enable-openssl --disable-linux-perf"' >> module.sh
          cat module.sh

      # 关键修复：直接删除 FFmpeg 源码中所有对 perf_event.h 的引用
      - name: Patch FFmpeg to remove perf_event.h dependency
        run: |
          cd ijkplayer/extra/ffmpeg
          # 递归替换所有 .c 和 .h 文件中的 #include <linux/perf_event.h>
          find . -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's|#include <linux/perf_event.h>|/* & */|g' {} \;
          # 特别处理 timer.h（确保）
          sed -i 's|#include <linux/perf_event.h>|/* & */|g' libavutil/timer.h || true

      - name: Compile OpenSSL
        run: |
          cd ijkplayer/android/contrib
          ./compile-openssl.sh clean
          ./compile-openssl.sh all

      - name: Compile FFmpeg
        run: |
          cd ijkplayer/android/contrib
          ./compile-ffmpeg.sh clean
          ./compile-ffmpeg.sh all

      - name: Compile IJKPlayer
        run: |
          cd ijkplayer/android
          ./compile-ijk.sh all

      # ========== 新增步骤 1：定位生成的 .so 文件 ==========
      - name: Locate built .so files
        run: |
          echo "=== Searching for libijkplayer.so files ==="
          find ijkplayer -name "libijkplayer.so" -type f 2>/dev/null | tee so_list.txt
          if [ ! -s so_list.txt ]; then
            echo "❌ No .so files found! Something went wrong in compilation."
            exit 1
          fi
          echo "✅ Found .so files at above paths."

      # ========== 修改后的收集步骤：自适应拷贝 ==========
      - name: Collect .so files
        run: |
          mkdir -p output/armeabi-v7a output/arm64-v8a
          # 精确匹配标准路径
          find ijkplayer -path "*/armeabi-v7a/libijkplayer.so" -exec cp {} output/armeabi-v7a/ \;
          find ijkplayer -path "*/arm64-v8a/libijkplayer.so" -exec cp {} output/arm64-v8a/ \;
          
          # 兜底：如果上面没找到，用 file 命令检测架构类型拷贝
          if [ -z "$(ls output/armeabi-v7a/)" ] || [ -z "$(ls output/arm64-v8a/)" ]; then
            echo "Fallback: copying by architecture detection..."
            for so in $(find ijkplayer -name "libijkplayer.so"); do
              if file "$so" | grep -q "ARM aarch64"; then
                cp "$so" output/arm64-v8a/
              elif file "$so" | grep -q "ARM"; then
                cp "$so" output/armeabi-v7a/
              fi
            done
          fi
          
          echo "=== Collected .so files ==="
          ls -l output/*/ || true
          nm -D output/armeabi-v7a/libijkplayer.so 2>/dev/null | grep SSL || echo "No SSL symbols in armv7 (check arm64)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ijkplayer-openssl-libs
          path: output/
