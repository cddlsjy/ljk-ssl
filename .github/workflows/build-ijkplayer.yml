name: Build IJKPlayer with OpenSSL (armv7 + arm64)

on:
  workflow_dispatch:   # 手动触发

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y git make yasm gcc g++ pkg-config autoconf automake libtool cmake
      - name: Install dependencies
  run: |
    sudo apt-get update
    sudo apt-get install -y git make yasm gcc g++ pkg-config autoconf automake libtool cmake
    sudo apt-get install -y linux-headers-$(uname -r)

- name: Enable OpenSSL in config
  run: |
    cd ijkplayer/config
    rm -f module.sh
    ln -s module-default.sh module.sh
    echo 'export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --enable-openssl --disable-linux-perf"' >> module.sh
      - name: Setup NDK r14b
        run: |
          cd $HOME
          wget -q https://dl.google.com/android/repository/android-ndk-r14b-linux-x86_64.zip
          unzip -q android-ndk-r14b-linux-x86_64.zip
          echo "ANDROID_NDK=$HOME/android-ndk-r14b" >> $GITHUB_ENV
          echo "$HOME/android-ndk-r14b" >> $GITHUB_PATH

      # 关键修复：覆盖 NDK_ROOT 并移除系统 NDK 干扰
      - name: Override system NDK
        run: |
          # 设置所有 NDK 相关变量指向 r14b
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK" >> $GITHUB_ENV
          echo "NDK_ROOT=$ANDROID_NDK" >> $GITHUB_ENV
          # 删除 GitHub 预装的高版本 NDK（避免编译脚本误用）
          sudo rm -rf /usr/local/lib/android/sdk/ndk/27.3.13750724
          # 确保 ndk-build 来自 r14b
          which ndk-build

      - name: Clone IJKPlayer
        run: |
          git clone https://github.com/Bilibili/ijkplayer.git ijkplayer
          cd ijkplayer
          git checkout k0.8.8

      - name: Initialize OpenSSL and FFmpeg
        run: |
          cd ijkplayer
          ./init-android-openssl.sh
          ./init-android.sh

      - name: Enable OpenSSL in config
        run: |
          cd ijkplayer/config
          rm -f module.sh
          ln -s module-default.sh module.sh
          echo 'export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --enable-openssl"' >> module.sh

      - name: Compile OpenSSL
        run: |
          cd ijkplayer/android/contrib
          ./compile-openssl.sh clean
          ./compile-openssl.sh all

      - name: Compile FFmpeg
        run: |
          cd ijkplayer/android/contrib
          ./compile-ffmpeg.sh clean
          ./compile-ffmpeg.sh all

      - name: Compile IJKPlayer
        run: |
          cd ijkplayer/android
          ./compile-ijk.sh all

      - name: Collect .so files (armv7 + arm64)
        run: |
          mkdir -p output/armeabi-v7a output/arm64-v8a
          cp ijkplayer/ijkplayer-armv7a/src/main/libs/armeabi-v7a/libijkplayer.so output/armeabi-v7a/
          cp ijkplayer/ijkplayer-arm64/src/main/libs/arm64-v8a/libijkplayer.so output/arm64-v8a/
          # 验证 SSL 符号
          nm -D output/armeabi-v7a/libijkplayer.so | grep SSL || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ijkplayer-openssl-libs
          path: output/
