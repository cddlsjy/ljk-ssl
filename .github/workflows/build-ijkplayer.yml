name: kimi-deepseek-Build ijkplayer with OpenSSL (armv7a + arm64)

on:
  workflow_dispatch:
    inputs:
      build_config:
        description: 'Build configuration'
        required: true
        default: 'module-default.sh'
        type: choice
        options:
          - module-lite.sh
          - module-default.sh
          - module-lite-hevc.sh
      architectures:
        description: 'Target architectures'
        required: true
        default: 'armv7a arm64'
        type: string

jobs:
  build:
    runs-on: ubuntu-20.04
    timeout-minutes: 120
    
    env:
      ANDROID_SDK_ROOT: /opt/android-sdk
      ANDROID_NDK_HOME: /opt/android-ndk-r10e
      IJK_VERSION: k0.8.8
      BUILD_ARCH: ${{ github.event.inputs.architectures || 'armv7a arm64' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 分离缓存检查和环境设置
      - name: Cache Android SDK and NDK
        id: cache-android
        uses: actions/cache@v4
        with:
          path: |
            /opt/android-sdk
            /opt/android-ndk-r10e
          key: ${{ runner.os }}-android-ndk-r10e-v2

      - name: Install dependencies
        if: steps.cache-android.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git yasm curl wget gcc g++ pkg-config autoconf automake \
            libtool cmake unzip build-essential python2.7 \
            openjdk-8-jdk libncurses5 libstdc++6 file bc
          sudo ln -sf /usr/bin/python2.7 /usr/bin/python

      - name: Setup Android SDK
        if: steps.cache-android.outputs.cache-hit != 'true'
        run: |
          sudo mkdir -p $ANDROID_SDK_ROOT
          cd $ANDROID_SDK_ROOT
          sudo wget -q https://dl.google.com/android/repository/commandlinetools-linux-7583922_latest.zip
          sudo unzip -q commandlinetools-linux-7583922_latest.zip
          sudo mkdir -p cmdline-tools/latest
          sudo mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          yes | sudo cmdline-tools/latest/bin/sdkmanager --licenses || true
          sudo cmdline-tools/latest/bin/sdkmanager "platforms;android-21" "build-tools;25.0.3" "platform-tools"

      - name: Download Android NDK r10e
        if: steps.cache-android.outputs.cache-hit != 'true'
        run: |
          sudo mkdir -p /opt
          cd /opt
          sudo wget -q https://dl.google.com/android/repository/android-ndk-r10e-linux-x86_64.zip || \
          sudo wget -q https://mirrors.tuna.tsinghua.edu.cn/android/repository/android-ndk-r10e-linux-x86_64.zip
          sudo unzip -q android-ndk-r10e-linux-x86_64.zip
          sudo rm android-ndk-r10e-linux-x86_64.zip
          # 修复awk
          if [ -f "$ANDROID_NDK_HOME/prebuilt/linux-x86_64/bin/awk" ]; then
            sudo rm -f $ANDROID_NDK_HOME/prebuilt/linux-x86_64/bin/awk
          fi

      # 关键：无论缓存是否命中，都要设置环境变量
      - name: Setup Environment Variables
        run: |
          echo "ANDROID_SDK=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK=$ANDROID_NDK_HOME" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_NDK_HOME" >> $GITHUB_PATH

      - name: Clone ijkplayer source
        run: |
          git clone https://github.com/Bilibili/ijkplayer.git ijkplayer-android
          cd ijkplayer-android
          git checkout -B latest $IJK_VERSION

      - name: Configure build options
        run: |
          cd ijkplayer-android/config
          rm -f module.sh
          cp ${{ github.event.inputs.build_config || 'module-default.sh' }} module.sh
          
          # 注释掉已删除的选项
          sed -i 's/^export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --disable-ffserver"/# &/' module.sh
          sed -i 's/^export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --disable-vda"/# &/' module.sh
          
          # 追加关键配置
          cat >> module.sh << 'EOF'

# Fix: Disable linux-perf to avoid missing perf_event.h
export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --disable-linux-perf"

# Enable OpenSSL for HTTPS support
export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --enable-openssl"
EOF
          cat module.sh

      - name: Initialize OpenSSL and FFmpeg
        run: |
          cd ijkplayer-android
          bash ./init-android.sh
          bash ./init-android-openssl.sh

      # 使用官方推荐的 all 参数编译所有架构
      - name: Compile OpenSSL
        run: |
          cd ijkplayer-android/android/contrib
          ./compile-openssl.sh clean
          ./compile-openssl.sh all

      - name: Compile FFmpeg
        run: |
          cd ijkplayer-android/android/contrib
          ./compile-ffmpeg.sh clean
          ./compile-ffmpeg.sh all

      - name: Compile ijkplayer
        run: |
          cd ijkplayer-android/android
          ./compile-ijk.sh all

      - name: Collect and Verify SO files
        run: |
          mkdir -p /home/runner/output/so-libraries
          
          # 动态收集所有编译出的架构
          for arch_dir in ijkplayer-android/android/ijkplayer/ijkplayer-*/src/main/libs/*/; do
            if [ -d "$arch_dir" ]; then
              arch_name=$(basename "$arch_dir")
              mkdir -p "/home/runner/output/so-libraries/$arch_name"
              cp "$arch_dir"/*.so "/home/runner/output/so-libraries/$arch_name/" 2>/dev/null || true
              
              # 验证OpenSSL
              if [ -f "/home/runner/output/so-libraries/$arch_name/libijkffmpeg.so" ]; then
                echo "=== $arch_name libijkffmpeg.so size ==="
                ls -lh "/home/runner/output/so-libraries/$arch_name/libijkffmpeg.so"
                if nm -D "/home/runner/output/so-libraries/$arch_name/libijkffmpeg.so" 2>/dev/null | grep -q "SSL"; then
                  echo "✓ OpenSSL symbols found"
                fi
              fi
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ijkplayer-openssl-${{ github.run_number }}
          path: /home/runner/output/
          retention-days: 30
