name: Build IJKPlayer with OpenSSL (armv7 + arm64)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git make yasm gcc g++ pkg-config autoconf automake libtool cmake
          sudo apt-get install -y linux-headers-generic

      - name: Setup NDK r14b
        run: |
          cd $HOME
          wget -q https://dl.google.com/android/repository/android-ndk-r14b-linux-x86_64.zip
          unzip -q android-ndk-r14b-linux-x86_64.zip
          echo "ANDROID_NDK=$HOME/android-ndk-r14b" >> $GITHUB_ENV
          echo "$HOME/android-ndk-r14b" >> $GITHUB_PATH

      - name: Override system NDK
        run: |
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK" >> $GITHUB_ENV
          echo "NDK_ROOT=$ANDROID_NDK" >> $GITHUB_ENV
          sudo rm -rf /usr/local/lib/android/sdk/ndk/27.3.13750724 || true

      - name: Clone IJKPlayer
        run: |
          git clone https://github.com/Bilibili/ijkplayer.git ijkplayer
          cd ijkplayer
          git checkout k0.8.8

      - name: Initialize OpenSSL and FFmpeg
        run: |
          cd ijkplayer
          ./init-android-openssl.sh
          ./init-android.sh

      - name: Enable OpenSSL and disable linux-perf
        run: |
          cd ijkplayer/config
          rm -f module.sh
          ln -s module-default.sh module.sh
          echo 'export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --enable-openssl --disable-linux-perf"' >> module.sh

      - name: Patch FFmpeg to remove perf_event.h
        run: |
          cd ijkplayer/extra/ffmpeg
          find . -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's|#include <linux/perf_event.h>|/* & */|g' {} \;
          sed -i 's|#include <linux/perf_event.h>|/* & */|g' libavutil/timer.h || true

      - name: Compile OpenSSL
        run: |
          cd ijkplayer/android/contrib
          ./compile-openssl.sh clean
          ./compile-openssl.sh all

      - name: Compile FFmpeg
        run: |
          cd ijkplayer/android/contrib
          ./compile-ffmpeg.sh clean
          ./compile-ffmpeg.sh all

      - name: Compile IJKPlayer
        run: |
          cd ijkplayer/android
          ./compile-ijk.sh all

      - name: Find and collect .so files
        run: |
          # 首先查找所有 libijkplayer.so 文件
          echo "Searching for libijkplayer.so ..."
          find ijkplayer -name "libijkplayer.so" -type f
          
          # 创建输出目录
          mkdir -p output/armeabi-v7a output/arm64-v8a
          
          # 尝试常见路径
          if [ -f "ijkplayer/ijkplayer-armv7a/src/main/libs/armeabi-v7a/libijkplayer.so" ]; then
            cp ijkplayer/ijkplayer-armv7a/src/main/libs/armeabi-v7a/libijkplayer.so output/armeabi-v7a/
          elif [ -f "ijkplayer/android/ijkplayer/armv7a/src/main/libs/armeabi-v7a/libijkplayer.so" ]; then
            cp ijkplayer/android/ijkplayer/armv7a/src/main/libs/armeabi-v7a/libijkplayer.so output/armeabi-v7a/
          else
            # 使用 find 的结果复制第一个找到的 armv7a 版本
            SO_FILE=$(find ijkplayer -path "*/armeabi-v7a/libijkplayer.so" | head -1)
            if [ -n "$SO_FILE" ]; then
              cp "$SO_FILE" output/armeabi-v7a/
            fi
          fi
          
          if [ -f "ijkplayer/ijkplayer-arm64/src/main/libs/arm64-v8a/libijkplayer.so" ]; then
            cp ijkplayer/ijkplayer-arm64/src/main/libs/arm64-v8a/libijkplayer.so output/arm64-v8a/
          elif [ -f "ijkplayer/android/ijkplayer/arm64/src/main/libs/arm64-v8a/libijkplayer.so" ]; then
            cp ijkplayer/android/ijkplayer/arm64/src/main/libs/arm64-v8a/libijkplayer.so output/arm64-v8a/
          else
            SO_FILE=$(find ijkplayer -path "*/arm64-v8a/libijkplayer.so" | head -1)
            if [ -n "$SO_FILE" ]; then
              cp "$SO_FILE" output/arm64-v8a/
            fi
          fi
          
          # 验证
          ls -la output/armeabi-v7a/ output/arm64-v8a/
          nm -D output/armeabi-v7a/libijkplayer.so | grep SSL || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ijkplayer-openssl-libs
          path: output/
