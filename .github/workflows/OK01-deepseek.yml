on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git make yasm gcc g++ pkg-config autoconf automake libtool cmake
          sudo apt-get install -y libncurses5

      - name: Setup NDK r14b
        run: |
          cd $HOME
          wget -q https://dl.google.com/android/repository/android-ndk-r14b-linux-x86_64.zip
          unzip -q android-ndk-r14b-linux-x86_64.zip
          echo "ANDROID_NDK=$HOME/android-ndk-r14b" >> $GITHUB_ENV
          echo "$HOME/android-ndk-r14b" >> $GITHUB_PATH

      - name: Override system NDK
        run: |
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK" >> $GITHUB_ENV
          echo "NDK_ROOT=$ANDROID_NDK" >> $GITHUB_ENV
          sudo rm -rf /usr/local/lib/android/sdk/ndk/27.3.13750724 || true

      - name: Clone IJKPlayer
        run: |
          git clone https://github.com/Bilibili/ijkplayer.git ijkplayer
          cd ijkplayer
          git checkout k0.8.8

      - name: Configure module.sh (before init)
        run: |
          cd ijkplayer/config
          rm -f module.sh
          cp module-default.sh module.sh
          sed -i '/--disable-ffserver/d' module.sh
          sed -i '/--disable-vda/d' module.sh
          echo '' >> module.sh
          echo '# Custom flags' >> module.sh
          echo 'export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --disable-linux-perf"' >> module.sh
          echo 'export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --enable-openssl"' >> module.sh
          cat module.sh

      - name: Initialize OpenSSL and FFmpeg
        run: |
          cd ijkplayer
          bash ./init-android-openssl.sh
          bash ./init-android.sh

      - name: Compile OpenSSL
        run: |
          cd ijkplayer/android/contrib
          ./compile-openssl.sh clean
          ./compile-openssl.sh all

      - name: Compile FFmpeg
        run: |
          cd ijkplayer/android/contrib
          ./compile-ffmpeg.sh clean
          ./compile-ffmpeg.sh all

      - name: Compile IJKPlayer
        run: |
          cd ijkplayer/android
          ./compile-ijk.sh all

      # ---------- 增强版 .so 收集（基于 deepseek 原版优化） ----------
      - name: Collect .so files (armv7 and arm64)
        run: |
          mkdir -p output/armeabi-v7a output/arm64-v8a

          echo "=== Full search for libijkplayer.so ==="
          # 1. 先尝试 find（与原版相同）
          find ijkplayer -name "libijkplayer.so" -type f -print0 | while IFS= read -r -d '' sofile; do
            echo "Found: $sofile"
            if echo "$sofile" | grep -qiE "armeabi-v7a|armv7a"; then
              echo "  -> Copy to armeabi-v7a/"
              cp "$sofile" output/armeabi-v7a/
            elif echo "$sofile" | grep -qiE "arm64-v8a|arm64"; then
              echo "  -> Copy to arm64-v8a/"
              cp "$sofile" output/arm64-v8a/
            else
              # 如果路径无法判断架构，用 file 命令检测 ELF 架构
              arch=$(file "$sofile" | grep -oE "ARM aarch64|ARM, EABI[0-9]+" | head -1)
              if echo "$arch" | grep -q "aarch64"; then
                echo "  -> Detected arm64-v8a via 'file' command"
                cp "$sofile" output/arm64-v8a/
              elif echo "$arch" | grep -q "ARM"; then
                echo "  -> Detected armeabi-v7a via 'file' command"
                cp "$sofile" output/armeabi-v7a/
              else
                echo "  -> Unknown ABI, copying to root output"
                cp "$sofile" output/
              fi
            fi
          done

          # 2. 如果 find 没有找到任何文件，尝试全局搜索（兜底）
          if [ ! -f output/armeabi-v7a/libijkplayer.so ] && [ ! -f output/arm64-v8a/libijkplayer.so ]; then
            echo "WARNING: find didn't locate libijkplayer.so, trying full system search..."
            find $HOME -name "libijkplayer.so" -type f 2>/dev/null | while read sofile; do
              echo "Found (fallback): $sofile"
              cp "$sofile" output/ 2>/dev/null || true
            done
          fi

          # 3. 备选路径（保持原版兼容）
          if [ ! -f output/armeabi-v7a/libijkplayer.so ]; then
            echo "Trying fallback paths for armeabi-v7a..."
            cp ijkplayer/android/ijkplayer/armv7a/src/main/libs/armeabi-v7a/libijkplayer.so output/armeabi-v7a/ 2>/dev/null || \
            cp ijkplayer/android/ijkplayer-armv7a/src/main/libs/armeabi-v7a/libijkplayer.so output/armeabi-v7a/ 2>/dev/null || \
            cp ijkplayer/android/ijkplayer/src/main/libs/armeabi-v7a/libijkplayer.so output/armeabi-v7a/ 2>/dev/null || true
          fi

          if [ ! -f output/arm64-v8a/libijkplayer.so ]; then
            echo "Trying fallback paths for arm64-v8a..."
            cp ijkplayer/android/ijkplayer/arm64/src/main/libs/arm64-v8a/libijkplayer.so output/arm64-v8a/ 2>/dev/null || \
            cp ijkplayer/android/ijkplayer-arm64/src/main/libs/arm64-v8a/libijkplayer.so output/arm64-v8a/ 2>/dev/null || \
            cp ijkplayer/android/ijkplayer/src/main/libs/arm64-v8a/libijkplayer.so output/arm64-v8a/ 2>/dev/null || true
          fi

          # 4. 显示最终结果
          echo "=== Final output contents ==="
          ls -la output/armeabi-v7a/ || echo "armeabi-v7a empty"
          ls -la output/arm64-v8a/ || echo "arm64-v8a empty"
          
          # 5. 检查文件大小（验证是否为真实 so）
          for so in output/armeabi-v7a/libijkplayer.so output/arm64-v8a/libijkplayer.so; do
            if [ -f "$so" ]; then
              size=$(stat -c%s "$so")
              echo "$so size: $size bytes"
              if [ $size -lt 100000 ]; then
                echo "WARNING: $so is suspiciously small (<100KB)"
              fi
            fi
          done

          # 6. SSL 符号验证
          if [ -f output/armeabi-v7a/libijkplayer.so ]; then
            echo "=== SSL symbols in armeabi-v7a ==="
            nm -D output/armeabi-v7a/libijkplayer.so 2>/dev/null | grep -i ssl | head -5 || echo "No SSL symbols (OpenSSL may not be linked)"
          fi
          if [ -f output/arm64-v8a/libijkplayer.so ]; then
            echo "=== SSL symbols in arm64-v8a ==="
            nm -D output/arm64-v8a/libijkplayer.so 2>/dev/null | grep -i ssl | head -5 || echo "No SSL symbols (OpenSSL may not be linked)"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ijkplayer-openssl-libs
          path: output/
