name: Build IJKPlayer with OpenSSL (armv7 + arm64)

on:
  workflow_dispatch:

jobs:
  build:
    # 使用 ubuntu-20.04 以避免 NDK r14b 的 GCC 4.9 在 22.04 上崩溃
    runs-on: ubuntu-20.04

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git make yasm gcc g++ pkg-config autoconf automake libtool cmake
          # 不需要 linux-headers-generic，它对 NDK 交叉编译无用

      - name: Setup NDK r14b
        run: |
          cd $HOME
          wget -q https://dl.google.com/android/repository/android-ndk-r14b-linux-x86_64.zip
          unzip -q android-ndk-r14b-linux-x86_64.zip
          echo "ANDROID_NDK=$HOME/android-ndk-r14b" >> $GITHUB_ENV
          echo "$HOME/android-ndk-r14b" >> $GITHUB_PATH

      - name: Override system NDK
        run: |
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK" >> $GITHUB_ENV
          echo "NDK_ROOT=$ANDROID_NDK" >> $GITHUB_ENV
          sudo rm -rf /usr/local/lib/android/sdk/ndk || true

      - name: Clone IJKPlayer
        run: |
          git clone https://github.com/Bilibili/ijkplayer.git ijkplayer
          cd ijkplayer
          git checkout k0.8.8

      - name: Initialize OpenSSL and FFmpeg
        run: |
          cd ijkplayer
          ./init-android-openssl.sh
          ./init-android.sh

      - name: Enable OpenSSL and disable linux-perf
        run: |
          cd ijkplayer/config
          rm -f module.sh
          ln -s module-default.sh module.sh
          echo 'export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --enable-openssl --disable-linux-perf"' >> module.sh
          cat module.sh

      # ========== 关键修复：彻底移除 perf_event.h 依赖 ==========
      - name: Create dummy linux/perf_event.h in NDK sysroots (optional but safe)
        run: |
          NDK=$ANDROID_NDK
          # armv7 -> API 14, arm64 -> API 21
          for arch in arm arm64; do
            if [ "$arch" = "arm" ]; then
              API=14
            else
              API=21
            fi
            SYSROOT="$NDK/platforms/android-$API/arch-$arch/usr/include"
            mkdir -p "$SYSROOT/linux"
            touch "$SYSROOT/linux/perf_event.h"
          done
          echo "Created dummy perf_event.h in NDK sysroots"

      - name: Patch FFmpeg to remove perf_event.h dependency
        run: |
          cd ijkplayer/extra/ffmpeg
          
          # 精确匹配 # 和 include 之间可能有空格的情况，并注释整行
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.h.in" \) \
            -exec sed -i 's/^[[:space:]]*#[[:space:]]*include[[:space:]]*<linux\/perf_event\.h>/\/\* & \*\//' {} \;
          
          # 特别确保 timer.h 和 timer.h.in 被处理
          for f in libavutil/timer.h libavutil/timer.h.in; do
            if [ -f "$f" ]; then
              sed -i 's/^[[:space:]]*#[[:space:]]*include[[:space:]]*<linux\/perf_event\.h>/\/\* & \*\//' "$f"
            fi
          done
          
          # 强制将 CONFIG_LINUX_PERF 宏改为 0，防止条件编译激活
          sed -i 's/^[[:space:]]*#[[:space:]]*if[[:space:]]*CONFIG_LINUX_PERF/#if 0 \/* CONFIG_LINUX_PERF disabled *\//' libavutil/timer.h
          
          # 验证修改
          echo "=== 验证 timer.h 是否已补丁 ==="
          grep -n "perf_event" libavutil/timer.h || echo "✓ timer.h 中无 perf_event 引用"

      - name: Compile OpenSSL
        run: |
          cd ijkplayer/android/contrib
          ./compile-openssl.sh clean
          ./compile-openssl.sh all

      - name: Compile FFmpeg
        run: |
          cd ijkplayer/android/contrib
          ./compile-ffmpeg.sh clean
          # 强制定义宏，让预处理器认为该头文件不存在
          export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --extra-cflags=-DHAVE_LINUX_PERF_EVENT_H=0"
          ./compile-ffmpeg.sh all

      - name: Compile IJKPlayer
        run: |
          cd ijkplayer/android
          ./compile-ijk.sh all

      - name: Collect .so files
        run: |
          mkdir -p output/armeabi-v7a output/arm64-v8a
          cp ijkplayer/ijkplayer-armv7a/src/main/libs/armeabi-v7a/libijkplayer.so output/armeabi-v7a/ || echo "armv7a lib not found"
          cp ijkplayer/ijkplayer-arm64/src/main/libs/arm64-v8a/libijkplayer.so output/arm64-v8a/ || echo "arm64 lib not found"
          echo "=== OpenSSL symbols in armeabi-v7a ==="
          nm -D output/armeabi-v7a/libijkplayer.so | grep SSL || echo "No SSL symbols found"
          echo "=== OpenSSL symbols in arm64-v8a ==="
          nm -D output/arm64-v8a/libijkplayer.so | grep SSL || echo "No SSL symbols found"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ijkplayer-openssl-libs
          path: output/
