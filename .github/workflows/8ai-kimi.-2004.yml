name: Build IJKPlayer with OpenSSL (armv7 + arm64)

on:
  workflow_dispatch:

jobs:
  build:
    # 使用 Ubuntu 20.04 避免 NDK r14b 与 22.04 的兼容性问题
    runs-on: ubuntu-20.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git make yasm gcc g++ pkg-config autoconf automake libtool cmake

      - name: Setup NDK r14b
        run: |
          cd $HOME
          wget -q https://dl.google.com/android/repository/android-ndk-r14b-linux-x86_64.zip
          unzip -q android-ndk-r14b-linux-x86_64.zip
          echo "ANDROID_NDK=$HOME/android-ndk-r14b" >> $GITHUB_ENV
          echo "$HOME/android-ndk-r14b" >> $GITHUB_PATH
          # 添加工具链路径
          echo "$HOME/android-ndk-r14b/toolchains/arm-linux-androideabi-4.9/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH
          echo "$HOME/android-ndk-r14b/toolchains/aarch64-linux-android-4.9/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Override system NDK
        run: |
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK" >> $GITHUB_ENV
          echo "NDK_ROOT=$ANDROID_NDK" >> $ITHUB_ENV
          sudo rm -rf /usr/local/lib/android/sdk/ndk/* || true

      - name: Clone IJKPlayer
        run: |
          git clone https://github.com/Bilibili/ijkplayer.git ijkplayer
          cd ijkplayer
          git checkout k0.8.8

      - name: Initialize OpenSSL and FFmpeg
        run: |
          cd ijkplayer
          ./init-android-openssl.sh
          ./init-android.sh

      - name: Enable OpenSSL and disable linux-perf
        run: |
          cd ijkplayer/config
          rm -f module.sh
          ln -s module-default.sh module.sh
          # 启用 OpenSSL 并禁用 perf
          echo 'export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --enable-openssl --disable-linux-perf"' >> module.sh
          cat module.sh

      # 双重保险修复 1: 在 NDK sysroot 中创建假的 perf_event.h
      - name: Create dummy linux/perf_event.h in NDK sysroots
        run: |
          NDK=$ANDROID_NDK
          for arch in arm arm64; do
            if [ "$arch" = "arm" ]; then
              API=14
              ARCH_DIR="arm"
            else
              API=21
              ARCH_DIR="arm64"
            fi
            SYSROOT=$NDK/platforms/android-$API/arch-$ARCH_DIR/usr/include
            sudo mkdir -p $SYSROOT/linux
            sudo touch $SYSROOT/linux/perf_event.h
            echo "Created dummy perf_event.h for $arch at $SYSROOT/linux/"
          done

      # 双重保险修复 2: 修改 FFmpeg 源码中的 timer.h 和 timer.h.in
      - name: Patch FFmpeg to remove perf_event.h dependency
        run: |
          cd ijkplayer
          
          # 找到 FFmpeg 目录
          FFMPEG_DIR=""
          if [ -d "extra/ffmpeg" ]; then
            FFMPEG_DIR="extra/ffmpeg"
          elif [ -d "android/contrib/ffmpeg" ]; then
            FFMPEG_DIR="android/contrib/ffmpeg"
          fi
          
          if [ -z "$FFMPEG_DIR" ] || [ ! -d "$FFMPEG_DIR" ]; then
            echo "错误: 找不到 FFmpeg 目录"
            exit 1
          fi
          
          echo "FFmpeg 目录: $FFMPEG_DIR"
          cd "$FFMPEG_DIR"
          
          # 关键修复: 使用改进的正则匹配 # include 带空格的情况
          # 匹配 #include、# include、#  include 等多种写法
          echo "=== Patching all files ==="
          find . -type f \( -name "*.c" -o -name "*.h" \) -exec grep -l "linux/perf_event.h" {} \; 2>/dev/null | while read file; do
            echo "Patching: $file"
            # 使用多种 sed 模式确保匹配成功
            sed -i 's|# *include *<linux/perf_event.h>|/* #include <linux/perf_event.h> */|g' "$file"
            sed -i 's|# *include *\"linux/perf_event.h\"|/* #include \"linux/perf_event.h\" */|g' "$file"
          done
          
          # 特别处理 timer.h - 最常见的出错点
          if [ -f "libavutil/timer.h" ]; then
            echo "=== Special handling for timer.h ==="
            cp libavutil/timer.h libavutil/timer.h.bak
            # 强制注释掉所有 perf_event 相关行
            sed -i 's|.*linux/perf_event.h.*|/* & - disabled for Android */|' libavutil/timer.h
            # 同时修改条件编译，强制禁用 CONFIG_LINUX_PERF
            sed -i 's/#if CONFIG_LINUX_PERF/#if 0  \/* Force disable *\/ /' libavutil/timer.h
            echo "timer.h patched:"
            grep -n "perf_event\\|CONFIG_LINUX_PERF" libavutil/timer.h || echo "No perf references found"
          fi
          
          # 处理 timer.h.in 模板文件（防止 configure 重新生成）
          if [ -f "libavutil/timer.h.in" ]; then
            echo "=== Patching timer.h.in ==="
            sed -i 's|# *include *<linux/perf_event.h>|/* #include <linux/perf_event.h> */|g' libavutil/timer.h.in
            sed -i 's/#if CONFIG_LINUX_PERF/#if 0/' libavutil/timer.h.in
          fi
          
          echo "=== Verification ==="
          grep -r "perf_event.h" . --include="*.h" --include="*.c" 2>/dev/null | head -5 || echo "✓ All perf_event.h references removed"

      - name: Compile OpenSSL
        run: |
          cd ijkplayer/android/contrib
          ./compile-openssl.sh clean
          ./compile-openssl.sh all

      - name: Compile FFmpeg with extra flags
        run: |
          cd ijkplayer/android/contrib
          ./compile-ffmpeg.sh clean
          # 强制添加宏定义禁用 perf，即使 configure 检测到也不使用
          export FF_EXTRA_CFLAGS="-DHAVE_LINUX_PERF_EVENT_H=0 -DHAVE_PERF_H=0"
          ./compile-ffmpeg.sh all

      - name: Compile IJKPlayer
        run: |
          cd ijkplayer/android
          ./compile-ijk.sh all

      - name: Collect .so files
        run: |
          mkdir -p output/armeabi-v7a output/arm64-v8a
          
          # 查找并复制 so 文件（带错误处理）
          if [ -f "ijkplayer/ijkplayer-armv7a/src/main/libs/armeabi-v7a/libijkplayer.so" ]; then
            cp ijkplayer/ijkplayer-armv7a/src/main/libs/armeabi-v7a/libijkplayer.so output/armeabi-v7a/
          elif [ -f "ijkplayer/ijkplayer-armv7a/library/src/main/libs/armeabi-v7a/libijkplayer.so" ]; then
            cp ijkplayer/ijkplayer-armv7a/library/src/main/libs/armeabi-v7a/libijkplayer.so output/armeabi-v7a/
          else
            echo "Warning: armv7a libijkplayer.so not found"
            find ijkplayer -name "libijkplayer.so" -path "*armv7a*" 2>/dev/null || true
          fi
          
          if [ -f "ijkplayer/ijkplayer-arm64/src/main/libs/arm64-v8a/libijkplayer.so" ]; then
            cp ijkplayer/ijkplayer-arm64/src/main/libs/arm64-v8a/libijkplayer.so output/arm64-v8a/
          elif [ -f "ijkplayer/ijkplayer-arm64/library/src/main/libs/arm64-v8a/libijkplayer.so" ]; then
            cp ijkplayer/ijkplayer-arm64/library/src/main/libs/arm64-v8a/libijkplayer.so output/arm64-v8a/
          else
            echo "Warning: arm64 libijkplayer.so not found"
            find ijkplayer -name "libijkplayer.so" -path "*arm64*" 2>/dev/null || true
          fi
          
          # 验证 OpenSSL 符号
          echo "=== Verifying OpenSSL symbols ==="
          if [ -f "output/armeabi-v7a/libijkplayer.so" ]; then
            echo "armeabi-v7a:"
            nm -D output/armeabi-v7a/libijkplayer.so | grep -i ssl | head -10 || echo "No SSL symbols (may need check)"
          fi
          if [ -f "output/arm64-v8a/libijkplayer.so" ]; then
            echo "arm64-v8a:"
            nm -D output/arm64-v8a/libijkplayer.so | grep -i ssl | head -10 || echo "No SSL symbols (may need check)"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ijkplayer-openssl-libs
          path: output/
