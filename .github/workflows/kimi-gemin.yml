name: Build ijkplayer with OpenSSL (armv7a + arm64)

on:
  workflow_dispatch:
    inputs:
      build_config:
        description: 'Build configuration'
        required: true
        default: 'module-default.sh'
        type: choice
        options:
          - module-lite.sh
          - module-default.sh
          - module-lite-hevc.sh

jobs:
  build:
    runs-on: ubuntu-22.04  # 使用支持的runner
    timeout-minutes: 120
    
    container:
      image: ubuntu:20.04   # 保持编译环境一致性
      env:
        DEBIAN_FRONTEND: noninteractive
    
    env:
      ANDROID_NDK: /opt/android-ndk-r10e
      ANDROID_NDK_HOME: /opt/android-ndk-r10e
      ANDROID_SDK: /opt/android-sdk

    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            git yasm curl wget gcc g++ pkg-config autoconf automake \
            libtool cmake unzip build-essential python2.7 \
            openjdk-8-jdk libncurses5 libstdc++6 file bc sudo
          ln -sf /usr/bin/python2.7 /usr/bin/python

      - uses: actions/checkout@v4

      - name: Setup Android SDK
        run: |
          mkdir -p $ANDROID_SDK
          cd $ANDROID_SDK
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-7583922_latest.zip
          unzip -q commandlinetools-linux-7583922_latest.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          yes | cmdline-tools/latest/bin/sdkmanager --licenses || true
          cmdline-tools/latest/bin/sdkmanager "platforms;android-21" "build-tools;25.0.3" "platform-tools"

      - name: Download NDK r10e
        run: |
          mkdir -p /opt
          cd /opt
          wget -q https://dl.google.com/android/repository/android-ndk-r10e-linux-x86_64.zip || \
          wget -q https://mirrors.tuna.tsinghua.edu.cn/android/repository/android-ndk-r10e-linux-x86_64.zip
          unzip -q android-ndk-r10e-linux-x86_64.zip
          rm android-ndk-r10e-linux-x86_64.zip
          rm -f $ANDROID_NDK_HOME/prebuilt/linux-x86_64/bin/awk 2>/dev/null || true

      - name: Clone and configure ijkplayer
        run: |
          git clone https://github.com/Bilibili/ijkplayer.git ijkplayer-android
          cd ijkplayer-android
          git checkout k0.8.8
          
          cd config
          rm -f module.sh
          cp ${{ github.event.inputs.build_config }} module.sh
          sed -i 's/^export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --disable-ffserver"/# &/' module.sh
          sed -i 's/^export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --disable-vda"/# &/' module.sh
          cat >> module.sh << 'EOF'
          export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --disable-linux-perf"
          export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --enable-openssl"
          EOF

      - name: Initialize and compile
        run: |
          cd ijkplayer-android
          bash ./init-android.sh
          bash ./init-android-openssl.sh
          
          cd android/contrib
          ./compile-openssl.sh clean && ./compile-openssl.sh all
          ./compile-ffmpeg.sh clean && ./compile-ffmpeg.sh all
          
          cd ..
          ./compile-ijk.sh all

      - name: Collect artifacts
        run: |
          mkdir -p output
          for dir in ijkplayer-android/android/ijkplayer/ijkplayer-*/src/main/libs/*/; do
            if [ -d "$dir" ]; then
              arch=$(basename "$dir")
              mkdir -p "output/$arch"
              cp "$dir"/*.so "output/$arch/" 2>/dev/null || true
            fi
          done

      - uses: actions/upload-artifact@v4
        with:
          name: ijkplayer-openssl-libs
          path: output/
