name: Build IJKPlayer with OpenSSL (Final Fixed)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git make yasm gcc g++ pkg-config autoconf automake libtool cmake libncurses5

      - name: Setup NDK r14b
        run: |
          cd $HOME
          wget -q https://dl.google.com/android/repository/android-ndk-r14b-linux-x86_64.zip
          unzip -q android-ndk-r14b-linux-x86_64.zip
          echo "ANDROID_NDK=$HOME/android-ndk-r14b" >> $GITHUB_ENV
          echo "$HOME/android-ndk-r14b" >> $GITHUB_PATH

      - name: Override system NDK
        run: |
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK" >> $GITHUB_ENV
          echo "NDK_ROOT=$ANDROID_NDK" >> $GITHUB_ENV
          sudo rm -rf /usr/local/lib/android/sdk/ndk/27.3.13750724 || true

      - name: Clone IJKPlayer
        run: |
          git clone https://github.com/Bilibili/ijkplayer.git ijkplayer
          cd ijkplayer
          git checkout k0.8.8

      - name: Configure module.sh
        run: |
          cd ijkplayer/config
          rm -f module.sh
          cp module-default.sh module.sh
          sed -i '/--disable-ffserver/d' module.sh
          sed -i '/--disable-vda/d' module.sh
          echo '' >> module.sh
          echo 'export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --disable-linux-perf"' >> module.sh
          echo 'export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --enable-openssl"' >> module.sh
          # 关闭 libxml2，避免 dash 依赖问题
          echo 'export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --disable-libxml2"' >> module.sh
          cat module.sh

      - name: Initialize OpenSSL and FFmpeg
        run: |
          cd ijkplayer
          bash ./init-android-openssl.sh
          bash ./init-android.sh

      - name: Compile OpenSSL
        run: |
          cd ijkplayer/android/contrib
          ./compile-openssl.sh clean
          ./compile-openssl.sh all

      # 关键修复：在 compile-ffmpeg.sh 运行之前，patch 所有架构的 configure 副本
      - name: Patch all FFmpeg configure copies for OpenSSL 1.1.0+
        run: |
          cd ijkplayer/android/contrib
          # 遍历所有 ffmpeg-* 目录
          for dir in ffmpeg-*/; do
            if [ -f "${dir}configure" ]; then
              echo "Patching ${dir}configure"
              sed -i 's/OPENSSL_init_ssl/OPENSSL_init_SSL/g' "${dir}configure"
              # 添加备用检测行（在 check_pkg_config 行后插入 check_lib）
              sed -i '/check_pkg_config openssl openssl openssl\/ssl.h OPENSSL_init_SSL/a\
              check_lib openssl openssl/ssl.h OPENSSL_init_SSL -lssl -lcrypto ||' "${dir}configure"
            fi
          done
          echo "All configure files patched."

      - name: Compile FFmpeg
        run: |
          cd ijkplayer/android/contrib
          ./compile-ffmpeg.sh clean
          export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --enable-openssl"
          ./compile-ffmpeg.sh all

      - name: Compile IJKPlayer
        run: |
          cd ijkplayer/android
          ./compile-ijk.sh all

      - name: Verify OpenSSL symbols (find actual .so)
        run: |
          cd ijkplayer/android
          # 查找所有 libijkplayer.so 文件
          SO_FILES=$(find . -name "libijkplayer.so" -type f)
          if [ -z "$SO_FILES" ]; then
            echo "❌ No libijkplayer.so found!"
            exit 1
          fi
          for SO in $SO_FILES; do
            echo "Checking $SO"
            nm -D "$SO" | grep -i ssl
            if [ $? -ne 0 ]; then
              echo "❌ No SSL symbols in $SO"
              exit 1
            else
              echo "✅ SSL symbols found in $SO"
            fi
          done

      - name: Collect .so files (only those with SSL)
        run: |
          mkdir -p output/armeabi-v7a output/arm64-v8a
          find ijkplayer -name "libijkplayer.so" -type f | while read sofile; do
            if echo "$sofile" | grep -q "armeabi-v7a\|armv7a"; then
              cp "$sofile" output/armeabi-v7a/
            elif echo "$sofile" | grep -q "arm64-v8a\|arm64"; then
              cp "$sofile" output/arm64-v8a/
            fi
          done
          ls -la output/*/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ijkplayer-openssl-verified
          path: output/
