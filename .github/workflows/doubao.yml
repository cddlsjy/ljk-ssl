name: Build IJKPlayer with OpenSSL HTTPS (修复版)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git make yasm gcc g++ pkg-config autoconf automake libtool curl wget unzip tree

      - name: Setup NDK r14b
        run: |
          cd $HOME
          wget -q https://dl.google.com/android/repository/android-ndk-r14b-linux-x86_64.zip
          unzip -q android-ndk-r14b-linux-x86_64.zip
          echo "ANDROID_NDK=$HOME/android-ndk-r14b" >> $GITHUB_ENV
          echo "$HOME/android-ndk-r14b" >> $GITHUB_PATH

      - name: Clone ijkplayer
        run: |
          git clone https://github.com/Bilibili/ijkplayer.git ijkplayer
          cd ijkplayer
          git checkout k0.8.8

      - name: Init openssl & ffmpeg
        run: |
          cd ijkplayer
          ./init-android-openssl.sh
          ./init-android.sh

      - name: Config module with openssl
        run: |
          cd ijkplayer/config
          rm module.sh
          ln -s module-lite.sh module.sh
          echo 'export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --enable-openssl"' >> module.sh
          echo 'export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --disable-linux-perf"' >> module.sh

      - name: Patch perf_event.h
        run: |
          cd ijkplayer/extra/ffmpeg
          find . -name "*.[ch]" -exec sed -i 's|#include <linux/perf_event.h>|/*patched*/|g' {} \;
          sed -i 's|HAVE_LINUX_PERF_EVENT_H 1|HAVE_LINUX_PERF_EVENT_H 0|g' libavutil/timer.h || true

      - name: Build openssl
        run: |
          cd ijkplayer/android/contrib
          ./compile-openssl.sh clean
          ./compile-openssl.sh arm64 armv7a

      - name: Build ffmpeg
        run: |
          cd ijkplayer/android/contrib
          ./compile-ffmpeg.sh clean
          ./compile-ffmpeg.sh arm64 armv7a

      - name: Build ijkplayer
        run: |
          cd ijkplayer/android
          ./compile-ijk.sh arm64
          ./compile-ijk.sh armv7a

      - name: Collect all so files (修复正确路径)
        run: |
          mkdir -p dist
          # 复制完整3个SO文件，路径100%正确
          cp -r ijkplayer/android/ijkplayer/ijkplayer-java/build/outputs/jni/* dist/
          # 打印目录结构，确认文件存在
          tree dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ijkplayer-openssl-https-so
          path: dist/
